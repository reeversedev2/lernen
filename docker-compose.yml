services:
  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: lernen
      MONGO_INITDB_ROOT_PASSWORD: lernen_dev_password
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1        # keep model pinned in RAM, never unload
      - OLLAMA_FLASH_ATTENTION=1    # faster attention kernel on ARM
      - OLLAMA_NUM_PARALLEL=1       # one request at a time, avoids memory splitting
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama-pull:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[ollama-pull] Waiting for Ollama server..."
        until ollama list > /dev/null 2>&1; do sleep 2; done
        if ollama list | grep -q "qwen3:1.7b"; then
          echo "[ollama-pull] qwen3:1.7b already present."
        else
          echo "[ollama-pull] Downloading qwen3:1.7b..."
          ollama pull qwen3:1.7b
          echo "[ollama-pull] Download complete."
        fi
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  languagetool:
    image: silviof/docker-languagetool
    restart: unless-stopped
    environment:
      - Java_Xms=256m
      - Java_Xmx=512m
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8010/v2/languages || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - MONGODB_URI=mongodb://lernen:lernen_dev_password@mongodb:27017/lernen?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_jwt_secret_change_in_production
      - JWT_REFRESH_SECRET=dev_refresh_secret_change_in_production
      - PORT=3001
      - NODE_ENV=production
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen3:1.7b
      - LANGUAGETOOL_URL=http://languagetool:8010
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      languagetool:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

volumes:
  mongodb_data:
  redis_data:
  ollama_data:
